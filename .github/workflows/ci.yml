name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --extra dev || pip install -e ".[dev]"
      - run: uv run mcp-admit --version
      - run: uv run mcp-admit schema admission
      - name: Test composite action
        uses: ./
        with:
          path: examples/safe_readonly_docs_manifest.json
          profile: ci
          fail-on: high
          format: json
          output: mcp-admit-action-smoke.json
      - run: uv run --extra dev ruff check .
      - run: uv run --extra dev pytest
      - run: uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mcp-admit-dist
          path: dist/*

  security-gate:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --extra dev || pip install -e ".[dev]"
      - run: uv run python -m mcp_admit scan examples/safe_mcp_config.json --format json --fail-on high --out mcp-admit-report.json
      - run: uv run python -m mcp_admit scan examples/poisoned_tool_manifest.json --format sarif --out mcp-admit-report.sarif
      - run: uv run python -m mcp_admit benchmark examples/fixture_matrix.yaml --format json --out mcp-admit-benchmark.json
      - run: uv run python -m mcp_admit benchmark examples/fixture_matrix.yaml --out mcp-admit-benchmark.md
      - run: uv run python -m mcp_admit decide examples/poisoned_tool_manifest.json --service agent-platform --owner security --environment ci --request-id github-actions --out mcp-admit-admission.json
      - run: uv run python -m mcp_admit schema report --out mcp-admit-report.schema.json
      - run: uv run python -m mcp_admit schema runtime-policy --out mcp-admit-runtime-policy.schema.json
      - run: uv run python -m mcp_admit schema audit --out mcp-admit-audit.schema.json
      - run: uv run python -m mcp_admit schema admission --out mcp-admit-admission.schema.json
      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        with:
          sarif_file: mcp-admit-report.sarif
          category: mcp-admit-demo
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mcp-admit-reports
          path: |
            mcp-admit-report.json
            mcp-admit-report.sarif
            mcp-admit-benchmark.json
            mcp-admit-benchmark.md
            mcp-admit-admission.json
            mcp-admit-report.schema.json
            mcp-admit-runtime-policy.schema.json
            mcp-admit-audit.schema.json
            mcp-admit-admission.schema.json
